name: Build & Upload Release Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-amd64
            runner: ubuntu-latest
            zig_target: x86_64-linux-musl
          - goos: linux
            goarch: arm64
            platform: linux-arm64
            runner: ubuntu-latest
            zig_target: aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            platform: darwin-amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            platform: darwin-arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            platform: windows-amd64
            runner: ubuntu-latest
            zig_target: x86_64-windows-gnu
            ext: .exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go.sum

      - name: Install Zig
        if: matrix.zig_target != ''
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.14.0"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          ZIG_TARGET: ${{ matrix.zig_target }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          BINARY_NAME="vela${{ matrix.ext }}"

          if [ -n "$ZIG_TARGET" ]; then
            export CC="zig cc -target $ZIG_TARGET"
            export CXX="zig c++ -target $ZIG_TARGET"
          fi

          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -trimpath \
            -o "${BINARY_NAME}" \
            ./cmd/vela

          ARCHIVE_NAME="vela-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar czf "${ARCHIVE_NAME}" "${BINARY_NAME}"

          if command -v sha256sum &>/dev/null; then
            sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          else
            shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            vela-*.tar.gz
            vela-*.sha256

  update-homebrew-tap:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Syfra3/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          REPO="Syfra3/vela"
          PACKAGE="vela"
          FORMULA="Formula/${PACKAGE}.rb"

          declare -A CHECKSUMS
          for platform in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            URL="https://github.com/${REPO}/releases/download/v${VERSION}/${PACKAGE}-${VERSION}-${platform}.tar.gz.sha256"
            SHA256=$(curl -sL "$URL" | awk '{print $1}')
            if [ -z "$SHA256" ]; then
              echo "ERROR: Could not fetch checksum for ${platform}"
              exit 1
            fi
            CHECKSUMS[$platform]="$SHA256"
            echo "${platform}: ${SHA256}"
          done

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "/darwin-arm64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[darwin-arm64]}\"/}" "$FORMULA"
          sed -i "/darwin-amd64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[darwin-amd64]}\"/}" "$FORMULA"
          sed -i "/linux-arm64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[linux-arm64]}\"/}" "$FORMULA"
          sed -i "/linux-amd64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[linux-amd64]}\"/}" "$FORMULA"

          echo "Formula updated to v${VERSION}"
          cat "$FORMULA"

      - name: Commit and push
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vela.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update vela to v${VERSION}"
          git push
