name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go
          package-name: vela
          
          changelog-types: |
            [
              {"type":"feat","section":"Features","hidden":false},
              {"type":"fix","section":"Bug Fixes","hidden":false},
              {"type":"perf","section":"Performance Improvements","hidden":false},
              {"type":"revert","section":"Reverts","hidden":false},
              {"type":"docs","section":"Documentation","hidden":false},
              {"type":"style","section":"Styles","hidden":true},
              {"type":"chore","section":"Miscellaneous","hidden":true},
              {"type":"refactor","section":"Code Refactoring","hidden":false},
              {"type":"test","section":"Tests","hidden":true},
              {"type":"build","section":"Build System","hidden":true},
              {"type":"ci","section":"Continuous Integration","hidden":true}
            ]

  build-and-upload:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-amd64
            zig_target: x86_64-linux-musl
          - goos: linux
            goarch: arm64
            platform: linux-arm64
            zig_target: aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            platform: darwin-amd64
            zig_target: x86_64-macos.12.0-none
          - goos: darwin
            goarch: arm64
            platform: darwin-arm64
            zig_target: aarch64-macos.12.0-none
          - goos: windows
            goarch: amd64
            platform: windows-amd64
            zig_target: x86_64-windows-gnu
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go.sum

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.14.0"

      - name: Build binary
        working-directory: .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: zig cc -target ${{ matrix.zig_target }}
          CXX: zig c++ -target ${{ matrix.zig_target }}
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          BINARY_NAME="vela${{ matrix.ext }}"

          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -trimpath \
            -o "${BINARY_NAME}" \
            ./cmd/vela

          ARCHIVE_NAME="vela-${{ needs.release-please.outputs.version }}-${{ matrix.platform }}.tar.gz"
          tar czf "${ARCHIVE_NAME}" "${BINARY_NAME}"

          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            vela-*.tar.gz
            vela-*.sha256

  update-homebrew-tap:
    needs: [release-please, build-and-upload]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Syfra3/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          REPO="Syfra3/vela"
          PACKAGE="vela"
          FORMULA="Formula/${PACKAGE}.rb"

          declare -A CHECKSUMS
          for platform in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            URL="https://github.com/${REPO}/releases/download/v${VERSION}/${PACKAGE}-${VERSION}-${platform}.tar.gz.sha256"
            SHA256=$(curl -sL "$URL" | awk '{print $1}')
            if [ -z "$SHA256" ]; then
              echo "ERROR: Could not fetch checksum for ${platform}"
              exit 1
            fi
            CHECKSUMS[$platform]="$SHA256"
            echo "${platform}: ${SHA256}"
          done

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "/darwin-arm64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[darwin-arm64]}\"/}" "$FORMULA"
          sed -i "/darwin-amd64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[darwin-amd64]}\"/}" "$FORMULA"
          sed -i "/linux-arm64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[linux-arm64]}\"/}" "$FORMULA"
          sed -i "/linux-amd64\.tar\.gz\"/{n; s/sha256 \".*\"/sha256 \"${CHECKSUMS[linux-amd64]}\"/}" "$FORMULA"

          echo "Formula updated to v${VERSION}"
          cat "$FORMULA"

      - name: Commit and push
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vela.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update vela to v${VERSION}"
          git push
